services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cashflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - "5173:5173"
    networks:
      - cashflow_network
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: cashflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cashflow_network
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    container_name: cashflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-cashflow}
      POSTGRES_USER: ${DB_USERNAME:-cashflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cashflow_network

  redis:
    image: redis:7-alpine
    container_name: cashflow_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "16379:6379"
    networks:
      - cashflow_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cashflow_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    command: >
      sh -c "php artisan queue:work redis --sleep=3 --tries=3 &
             php artisan schedule:work"
    networks:
      - cashflow_network
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:

networks:
  cashflow_network:
    driver: bridge
